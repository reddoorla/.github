name: ci
on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for CI (defaults to the org standard)
        type: string
        default: "22"
      netlify-site:
        description: Netlify site name for the deploy-preview URL (defaults to the repo name)
        type: string
        default: ""
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .
      - run: pnpm exec svelte-kit sync && pnpm exec svelte-check --tsconfig ./tsconfig.json
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec reddoor-maint audit --only a11y --fail-on-violations
      - name: Test (if present)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            pnpm test
          else
            echo "no test script — skipping"
          fi

      # Smoke suite (health-gate): run the site's own `test:smoke` at PR time so a
      # broken route / hydration regression is caught before merge, complementing the
      # nightly fleet-smoke producer (reddoor-maintenance) that writes Smoke OK to
      # Airtable. chromium's OS libs are already installed above; the site's script
      # installs the browser binary. `if present` so a site without the suite skips.
      - name: Smoke test (if present)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['test:smoke'] ? 0 : 1)"; then
            pnpm test:smoke
          else
            echo "no test:smoke script — skipping"
          fi

  deploy-preview-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Comment Netlify deploy preview link
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NETLIFY_SITE: ${{ inputs.netlify-site }}
        with:
          script: |
            const site = process.env.NETLIFY_SITE || context.repo.repo;
            const pr = context.issue.number;
            const url = `https://deploy-preview-${pr}--${site}.netlify.app`;
            const marker = "<!-- netlify-deploy-preview -->";
            const body = [
              marker,
              "### 🔍 Netlify deploy preview",
              "",
              `**[${url}](${url})**`,
              "",
              "<sub>Auto-posted · live once Netlify finishes building this PR · updates on each push.</sub>",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prev.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
